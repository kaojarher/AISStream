<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球船舶即時追蹤系統 (AISStream)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* 狀態面板樣式 */
        #status-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 300px;
        }
        #status-panel h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }
        .status-item {
            margin: 8px 0;
            font-size: 13px;
            color: #555;
        }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
        }
        .badge-connecting { background-color: #f39c12; }
        .badge-connected { background-color: #2ecc71; }
        .badge-disconnected { background-color: #e74c3c; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="status-panel">
        <h3>AIS 即時監控面板</h3>
        <div class="status-item">連線狀態: <span id="conn-status" class="badge badge-disconnected">中斷</span></div>
        <div class="status-item">當前追蹤船隻數: <span id="ship-count" style="font-weight:bold;">0</span></div>
        <div class="status-item" style="font-size: 11px; color: #7f8c8d; margin-top: 10px;">
            提示：AISStream 需要特定 API Key。預設訂閱範圍為台灣海峽周邊。
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ================= 配置設定 =================
        // 請至 https://aisstream.io/ 註冊並取得免費的 API Key
        const AISSTREAM_API_KEY = "95f3b8aee4389e6a385bc4bb550a5d0dc2ef2f03"; 
        
        // 設定訂閱的地理邊界 (Bounding Box)
        // 格式為: [[南緯, 西經], [北緯, 東經]] 
        // 範例為台灣及周邊海域海面
        const boundingBoxes = [
            [[21.0, 119.0], [26.5, 123.5]]
        ];
        // ============================================

        // 初始化 Leaflet 地圖 (定位在台灣海峽中央)
        const map = L.map('map').setView([23.8, 121.0], 7);

        // 載入 OpenStreetMap 英文/通用地圖磚
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 用於儲存地圖上所有船隻標記的物件 (Key 為 MMSI)
        const shipMarkers = {};
        let socket = null;

        // 更新 UI 狀態
        function updateStatus(status, className) {
            const statusEl = document.getElementById('conn-status');
            statusEl.textContent = status;
            statusEl.className = `badge ${className}`;
        }

        function updateShipCount() {
            document.getElementById('ship-count').textContent = Object.keys(shipMarkers).length;
        }

        // 初始化 WebSocket 連線
        function connectAISStream() {
            if (AISSTREAM_API_KEY === "YOUR_AISSTREAM_API_KEY") {
                alert("請先在原始碼中修改並填入您的 AISStream API Key 才能開始接收資料！");
                return;
            }

            updateStatus("連線中...", "badge-connecting");
            
            // 建立 WebSocket 連線
            socket = new WebSocket("wss://stream.aisstream.io/v1/live");

            socket.onopen = function (event) {
                updateStatus("已連線", "badge-connected");
                
                // 構造訂閱訊息 (Subscription Message)
                const subscriptionMessage = {
                    APIKey: AISSTREAM_API_KEY,
                    BoundingBoxes: boundingBoxes,
                    FiltersShipMMSI: [], // 空陣列代表不過濾特定 MMSI，接收範圍內所有船隻
                    FilterMessageTypes: ["PositionReport"] // 主要訂閱位置回報訊息
                };

                // 發送訂閱請求
                socket.send(JSON.stringify(subscriptionMessage));
            };

            socket.onmessage = function (event) {
                const aisData = JSON.parse(event.data);
                
                // 確保資料包含位置回報
                if (!aisData || !aisData.Message || !aisData.Message.PositionReport) return;

                const positionReport = aisData.Message.PositionReport;
                const mmsi = aisData.MetaData.MMSI;
                const shipName = aisData.MetaData.ShipName ? aisData.MetaData.ShipName.trim() : `MMSI: ${mmsi}`;
                const latitude = parseFloat(aisData.MetaData.Latitude);
                const longitude = parseFloat(aisData.MetaData.Longitude);
                const speed = positionReport.Sog; // 對地速度 (Knots)
                const course = positionReport.Cog; // 對地航向 (Degrees)
                const timestamp = aisData.MetaData.time_utc;

                // 驗證經緯度有效性
                if (isNaN(latitude) || isNaN(longitude)) return;

                // 彈出視窗內容
                const popupContent = `
                    <div style="font-size:13px;">
                        <strong style="font-size:14px; color:#2c3e50;">${shipName}</strong><br>
                        <b>MMSI:</b> ${mmsi}<br>
                        <b>速度:</b> ${speed} 節 (Knots)<br>
                        <b>航向:</b> ${course}°<br>
                        <b>緯度:</b> ${latitude.toFixed(4)}<br>
                        <b>經度:</b> ${longitude.toFixed(4)}<br>
                        <span style="font-size:10px; color:#95a5a6;">更新時間: ${timestamp}</span>
                    </div>
                `;

                if (shipMarkers[mmsi]) {
                    // 若船隻已存在，更新其位置與彈出視窗內容
                    shipMarkers[mmsi].setLatLng([latitude, longitude]);
                    shipMarkers[mmsi].setPopupContent(popupContent);
                } else {
                    // 新船隻，建立新的圓點標記 (CircleMarker)
                    const marker = L.circleMarker([latitude, longitude], {
                        radius: 6,
                        fillColor: "#3498db",
                        color: "#fff",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map);

                    marker.bindPopup(popupContent);
                    
                    // 將標記存入物件管理
                    shipMarkers[mmsi] = marker;
                    updateShipCount();
                }
            };

            socket.onclose = function (event) {
                updateStatus("中斷", "badge-disconnected");
                console.log("WebSocket 已關閉，5秒後嘗試重新連線...", event);
                setTimeout(connectAISStream, 5000); // 自動重連機制
            };

            socket.onerror = function (error) {
                console.error("WebSocket 發生錯誤: ", error);
                socket.close();
            };
        }

        // 頁面載入後自動啟動
        window.onload = connectAISStream;
    </script>
	<Center>本工具由高嘉和2026編寫</Center>
</body>
</html>
