<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球船舶即時追蹤系統 (OSM 開源終極版)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #1a1a1a;
        }
        #status-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.9);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            max-width: 300px;
            border: 1px solid #444;
        }
        #status-panel h3 {
            margin-bottom: 10px;
            font-size: 15px;
            color: #2ecc71;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 5px;
        }
        .status-item {
            margin: 8px 0;
            font-size: 13px;
        }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
        }
        .badge-connecting { background-color: #f39c12; }
        .badge-connected { background-color: #2ecc71; }
        .badge-disconnected { background-color: #e74c3c; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="status-panel">
        <h3>⚓ OSM 船舶即時監控</h3>
        <div class="status-item">系統狀態: <span id="conn-status" class="badge badge-disconnected">中斷</span></div>
        <div class="status-item">目前接收船隻數: <span id="ship-count" style="font-weight:bold; color:#2ecc71;">0</span></div>
        <div class="status-item" style="font-size: 11px; color: #aaa; margin-top: 10px;">
            技術架構：Leaflet.js + OpenStreetMap<br>數據流：直連 AISStream 官方 WSS 端點。
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 配置設定
        const AISSTREAM_API_KEY = "95f3b8aee4389e6a385bc4bb550a5d0dc2ef2f03"; 
        const boundingBoxes = [[[21.0, 119.0], [26.0, 123.0]]];

        // 修正：直接連線到 AISStream 官方端點，不需要第三方代理
        // 瀏覽器 WebSocket 沒有 CORS 限制，可直接建立連線
        const AISSTREAM_WSS_URL = "wss://stream.aisstream.io/v0/stream";

        // 初始化深色系或標準 OSM 地圖
        const map = L.map('map').setView([23.8, 121.0], 7);
        
        // 載入開源地圖磚
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const shipMarkers = {};
        let socket = null;

        function updateStatus(status, className) {
            const statusEl = document.getElementById('conn-status');
            statusEl.textContent = status;
            statusEl.className = `badge ${className}`;
        }

        function updateShipCount() {
            document.getElementById('ship-count').textContent = Object.keys(shipMarkers).length;
        }

        function connectAISStream() {
            updateStatus("網關建立中...", "badge-connecting");
            
            // 直接連線官方端點
            socket = new WebSocket(AISSTREAM_WSS_URL);

            socket.onopen = function (event) {
                updateStatus("已連線", "badge-connected");
                console.log("WebSocket 連線成功！正在向 AISStream 提交認證...");
                
                const subscriptionMessage = {
                    APIKey: AISSTREAM_API_KEY,
                    BoundingBoxes: boundingBoxes,
                    FiltersShipMMSI: [], 
                    FilterMessageTypes: ["PositionReport"]
                };
                socket.send(JSON.stringify(subscriptionMessage));
            };

            socket.onmessage = function (event) {
                try {
                    const aisData = JSON.parse(event.data);
                    if (!aisData || !aisData.Message || !aisData.Message.PositionReport) return;

                    const positionReport = aisData.Message.PositionReport;
                    const mmsi = aisData.MetaData.MMSI;
                    const shipName = aisData.MetaData.ShipName ? aisData.MetaData.ShipName.trim() : `MMSI: ${mmsi}`;
                    const latitude = parseFloat(aisData.MetaData.Latitude);
                    const longitude = parseFloat(aisData.MetaData.Longitude);
                    const speed = positionReport.Sog; 
                    const course = positionReport.Cog; 

                    if (isNaN(latitude) || isNaN(longitude)) return;

                    const popupContent = `
                        <div style="font-size:13px; color:#333;">
                            <strong>🚢 ${shipName}</strong><br>
                            <b>MMSI:</b> ${mmsi}<br>
                            <b>航速:</b> ${speed} 節<br>
                            <b>航向:</b> ${course}°
                        </div>
                    `;

                    if (shipMarkers[mmsi]) {
                        shipMarkers[mmsi].setLatLng([latitude, longitude]);
                        shipMarkers[mmsi].setPopupContent(popupContent);
                    } else {
                        const marker = L.circleMarker([latitude, longitude], {
                            radius: 5,
                            fillColor: "#2ecc71",
                            color: "#fff",
                            weight: 1,
                            fillOpacity: 0.8
                        }).addTo(map);

                        marker.bindPopup(popupContent);
                        shipMarkers[mmsi] = marker;
                        updateShipCount();
                    }
                } catch (e) {
                    console.error("解析資料出錯:", e);
                }
            };

            socket.onclose = function (event) {
                updateStatus("中斷", "badge-disconnected");
                console.log("連線斷開，5秒後嘗試自動重連...", event);
                setTimeout(connectAISStream, 5000); 
            };

            socket.onerror = function (error) {
                console.error("WebSocket 發生錯誤:", error);
            };
        }

        window.onload = connectAISStream;
    </script>
</body>
</html>
